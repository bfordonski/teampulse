services:
  postgres:
    image: postgres:16-alpine
    container_name: consulting-platform-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: consulting
      POSTGRES_PASSWORD: consulting
      POSTGRES_DB: consulting_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
